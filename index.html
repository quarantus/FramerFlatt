<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Framer Flatten | Kill the div soup</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Framer Flatten">
  <meta property="og:description" content="Drop a Framer export. We tear down the deep div nesting and give you clean HTML/CSS/GSAP.">
  <meta property="og:image" content="https://framer-flatten.pages.dev/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://framer-flatten.pages.dev/og-image.jpg">
  <style>
    :root{--orange:#FF5A1F;--orange-ghost:rgba(255,90,31,.1);--green:#00C853}
    *{box-sizing:border-box}
    body{
      font-family:system-ui,-apple-system,BlinkMacSystemFont;
      margin:0;min-height:100vh;color:#696969;
      background:#FFFF;
      display:flex;align-items:center;justify-content:center;padding:2rem;
    }
 .card{
      width:100%;max-width:720px;background:rgba(255,255,255,.92);
      backdrop-filter:blur(12px);border-radius:16px;padding:2.5rem;
      box-shadow:0 20px 60px rgba(0,0,0,.15)
    }
    h1{margin:0 0 1rem;font-size:2rem;letter-spacing:-.02em}
    p{opacity:.7;margin:0 0 2rem;line-height:1.6}
    p1{color:#1E1E1E;}
    input[type=file]{display:none}
 .btn{
      display:inline-flex;align-items:center;gap:.5rem;
      font:inherit;font-weight:500;padding:.75rem 1.25rem;
      border-radius:10px;cursor:pointer;transition:.15s;
      background:transparent;border:1.5px solid var(--orange);color:var(--orange)
    }
 .btn:hover:not(:disabled){background:var(--orange-ghost)}
 .btn:disabled{opacity:.4;cursor:not-allowed}
 .btn-primary{background:var(--orange);color:#fff;border-color:var(--orange)}
 .btn-primary:hover:not(:disabled){filter:brightness(.95)}
 .btn-row{display:flex;flex-wrap:wrap;gap:.75rem;margin:1.5rem 0}
 .row{margin:1rem 0}
    code{background:#f1f1f1;padding:.2rem.4rem;border-radius:4px;font-size:.9em}
    input[type=text]{font:inherit;padding:.6rem;border-radius:8px;border:1.5px solid #ddd;width:220px}
    input[type=text]:focus{outline:none;border-color:var(--orange)}
    dialog::backdrop{background:rgba(0,0,0,.4)}
    dialog{border:none;border-radius:16px;padding:0;max-width:440px;width:90%}
    dialog[open]{animation:pop.2s ease-out}@keyframes pop{from{transform:scale(.95);opacity:0}}
 .icon{width:18px;height:18px;stroke:currentColor;stroke-width:1.5;fill:none}
 .spinner{width:18px;height:18px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin.6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
 .processing{position:relative}
 .processing::after{
      content:'';position:absolute;inset:0;background:rgba(255,255,255,.6);
      backdrop-filter:blur(2px);border-radius:16px;display:flex;align-items:center;justify-content:center;
    }
 .file-indicator{
      display:flex;align-items:center;gap:.5rem;margin-top:1rem;padding:.75rem;
      background:var(--orange-ghost);border:1px solid var(--orange);border-radius:10px;color:var(--orange)
    }
 .error{background:rgba(255,0,0,.08);border-color:#ff0000;color:#d00000}
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>Framer Flatten</h1>
    <p>Drop a Framer export <p1>(save the source code from your browser and save it as html ).</p1> <br> We tear down the deep div nesting and give you clean HTML/CSS/GSAP.</p>

    <label class="btn btn-primary">
      <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      Choose Framer HTML
      <input type="file" id="file" accept=".html">
    </label>

    <div id="fileIndicator" style="display:none"></div>

    <div id="actionStep" style="display:none">
      <div class="btn-row">
        <button class="btn" id="analyzeBtn" onclick="startAnalyze()">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span>Analyze Blocks</span>
        </button>
        <button class="btn" onclick="resetFile()">
          <svg class="icon" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Change File
        </button>
      </div>
    </div>

    <div id="renameStep" style="display:none">
      <h3 style="margin:2rem 0 1rem">2. Rename your blocks</h3>
      <div id="renameList"></div>
      <div class="row">
        <label style="display:flex;align-items:center;gap:.5rem;margin:.5rem 0">
          <input type="radio" name="splitMode" value="zip" checked> ZIP: HTML + CSS + GSAP
        </label>
        <label style="display:flex;align-items:center;gap:.5rem">
          <input type="radio" name="splitMode" value="inline"> Single HTML file
        </label>
      </div>
      <button class="btn btn-primary" id="flattenBtn" onclick="doFlatten()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        <span>3. Flatten + Download</span>
      </button>
    </div>
    <p id="status" style="margin-top:1rem;opacity:.7"></p>
  </div>

  <dialog id="supportModal">
    <div style="padding:2rem">
      <h3 style="margin:0 0.5rem">Your file is ready!</h3>
      <p style="opacity:.7;margin:0 0 1.5rem">Flattened <span id="savedPercent">0%</span> of code. This tool is free.</p>
      <button onclick="downloadFile()" class="btn btn-primary" style="width:100%;justify-content:center">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Download anyway
      </button>
      <p style="font-size:.75rem;opacity:.5;margin:1rem 0 0;text-align:center">Use the Ko-fi button to support →</p>
    </div>
  </dialog>

<script>
let currentFile, pendingBlob, pendingFilename, savedRatio = '0%';
const fileInput = document.getElementById('file');
const analyzeBtn = document.getElementById('analyzeBtn');
const flattenBtn = document.getElementById('flattenBtn');
const card = document.getElementById('card');
const fileIndicator = document.getElementById('fileIndicator');

function showError(msg) {
  fileIndicator.style.display = 'flex';
  fileIndicator.className = 'file-indicator error';
  fileIndicator.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><span>${msg}</span>`;
}

function showSuccess(filename, size) {
  fileIndicator.style.display = 'flex';
  fileIndicator.className = 'file-indicator';
  fileIndicator.innerHTML = `<svg class="icon" style="stroke:var(--green)" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg><span>Uploaded: ${filename} (${(size/1024).toFixed(1)} KB)</span>`;
}

function setLoading(btn, loading, text) {
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = `<div class="spinner"></div><span>${text}</span>`;
    card.classList.add('processing');
  } else {
    btn.disabled = false;
    card.classList.remove('processing');
  }
}

fileInput.onchange = () => {
  currentFile = fileInput.files[0];
  if (!currentFile) return;
  showSuccess(currentFile.name, currentFile.size);
  document.getElementById('actionStep').style.display = 'block';
  status.textContent = '';
};

function resetFile(){
  fileInput.value='';
  actionStep.style.display='none';
  renameStep.style.display='none';
  fileIndicator.style.display='none';
  status.textContent='';
}

async function startAnalyze() {
  setLoading(analyzeBtn, true, 'Analyzing...');
  status.textContent = 'Reading blocks from your file...';
  try {
    const fd = new FormData(); fd.append('file', currentFile);
    const res = await fetch('/api/analyze', { method: 'PUT', body: fd });
    console.log('Analyze response:', res.status, res.statusText);
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`Server ${res.status}: ${txt.slice(0,100)}`);
    }
    const { blocks } = await res.json();
    if (!blocks || blocks.length === 0) throw new Error('No blocks found in file');
    renameList.innerHTML = blocks.map(b => `
      <div class="row" style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
        <code>${b.oldKey}</code>
        <svg class="icon" style="opacity:.3" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        <input type="text" value="${b.suggestedName}" data-old="${b.oldKey}">
        <small style="opacity:.6">${b.preview}</small>
      </div>`).join('');
    renameStep.style.display = 'block';
    status.textContent = `Found ${blocks.length} blocks to rename`;
  } catch (e) {
    console.error('Analyze error:', e);
    showError(`Analyze failed: ${e.message}. Check if /api/analyze exists.`);
  } finally {
    analyzeBtn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span>Analyze Blocks</span>`;
    setLoading(analyzeBtn, false);
  }
}

async function doFlatten() {
  setLoading(flattenBtn, true, 'Flattening...');
  status.textContent = 'Tearing down div soup...';
  try {
    const renames = {}; document.querySelectorAll('#renameList input').forEach(i => renames[i.dataset.old] = i.value);
    const fd = new FormData(); fd.append('file', currentFile); fd.append('renames', JSON.stringify(renames)); fd.append('splitMode', document.querySelector('[name=splitMode]:checked').value);
    const res = await fetch('/api/flatten', { method: 'POST', body: fd });
    if (!res.ok) throw new Error(`Server ${res.status}`);
    pendingBlob = await res.blob(); pendingFilename = res.headers.get('content-disposition').includes('zip')? 'site.zip' : 'index.html';
    savedRatio = res.headers.get('X-Size-Reduction') || '80%+'; document.getElementById('savedPercent').textContent = savedRatio;
    document.getElementById('supportModal').showModal(); status.textContent = '';
  } catch (e) {
    showError(`Flatten failed: ${e.message}`);
  } finally {
    flattenBtn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg><span>3. Flatten + Download</span>`;
    setLoading(flattenBtn, false);
  }
}

function downloadFile() {
  const url = URL.createObjectURL(pendingBlob);
  Object.assign(document.createElement('a'), { href: url, download: pendingFilename }).click();
  supportModal.close();
}
</script>

<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  kofiWidgetOverlay.draw('quarantus', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Donate',
    'floating-chat.donateButton.background-color': '#ffffff',
    'floating-chat.donateButton.text-color': '#323842'
  });
</script>
</body>
</html>
